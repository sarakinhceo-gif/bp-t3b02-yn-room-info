            border: 4px solid #ff3b00;

            transform: rotate(0.5deg);
            position: relative;

            color: #ff3b00;
            margin-bottom: 8px;

            font-size: 1.2rem;
            color: #cccccc;
            font-weight: 300;
        }

            margin-top: 64px;
        }

            background: #0a0a0a;
            border: 3px solid #ffffff;
            padding: 48px 32px;
            position: relative;
            transform: rotate(-0.5deg);
        }

            transform: rotate(0.7deg) translateY(12px);
        }

            content: '"';
            font-size: 6rem;
            color: #ff3b00;
            position: absolute;
            top: -20px;
            left: 16px;
            font-family: Impact, sans-serif;

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            transform: rotate(var(--r, 0deg));
            transition: 0.2s;
        }

        .gallery-item:nth-child(2) { --r: 2deg; }
        .gallery-item:nth-child(3) { --r: -1.5deg; }
        .gallery-item:nth-child(4) { --r: 1deg; }
        .gallery-item:nth-child(5) { --r: -2deg; }
        .gallery-item:nth-child(6) { --r: 0.5deg; }

            border-color: #ff3b00;
            transform: scale(1.02) rotate(0deg);
        }
